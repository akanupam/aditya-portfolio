<svg viewBox="0 0 480 640" xmlns="http://www.w3.org/2000/svg" width="480" height="640">
  <!-- Gradient backgrounds for light and dark modes -->
  <defs>
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGradient" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="480" height="640" fill="url(#lightGradient)" class="bg-light"/>
  <rect width="480" height="640" fill="url(#darkGradient)" class="bg-dark" style="display:none"/>

  <!-- Accent glow -->
  <circle cx="240" cy="120" r="200" fill="url(#accentGradient)"/>

  <!-- Head -->
  <circle cx="240" cy="180" r="80" fill="#d4d4d4" class="profile-head-light"/>
  <circle cx="240" cy="180" r="80" fill="#404040" class="profile-head-dark" style="display:none"/>

  <!-- Eyes -->
  <circle cx="220" cy="160" r="8" fill="#686868" class="profile-eyes-light"/>
  <circle cx="260" cy="160" r="8" fill="#686868" class="profile-eyes-light"/>
  <circle cx="220" cy="160" r="8" fill="#a0a0a0" class="profile-eyes-dark" style="display:none"/>
  <circle cx="260" cy="160" r="8" fill="#a0a0a0" class="profile-eyes-dark" style="display:none"/>

  <!-- Eye pupils -->
  <circle cx="222" cy="162" r="4" fill="#1a1a1a" class="profile-pupils-light"/>
  <circle cx="262" cy="162" r="4" fill="#1a1a1a" class="profile-pupils-light"/>
  <circle cx="222" cy="162" r="4" fill="#e8e8e8" class="profile-pupils-dark" style="display:none"/>
  <circle cx="262" cy="162" r="4" fill="#e8e8e8" class="profile-pupils-dark" style="display:none"/>

  <!-- Smile/mouth -->
  <path d="M 220 195 Q 240 210 260 195" stroke="#686868" stroke-width="3" fill="none" stroke-linecap="round" class="profile-mouth-light"/>
  <path d="M 220 195 Q 240 210 260 195" stroke="#a0a0a0" stroke-width="3" fill="none" stroke-linecap="round" class="profile-mouth-dark" style="display:none"/>

  <!-- Shoulders/Body -->
  <ellipse cx="240" cy="320" rx="100" ry="120" fill="#c8c8c8" class="profile-body-light"/>
  <ellipse cx="240" cy="320" rx="100" ry="120" fill="#303030" class="profile-body-dark" style="display:none"/>

  <!-- AI Badge accent -->
  <rect x="160" y="280" width="160" height="60" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.3" rx="4"/>
  <text x="240" y="310" font-family="'Courier New', monospace" font-size="12" fill="#58a6ff" text-anchor="middle" opacity="0.4">
    AI Engineer
  </text>

  <style>
    @media (prefers-color-scheme: dark) {
      .bg-light { display: none; }
      .bg-dark { display: block !important; }
      .profile-head-light { display: none; }
      .profile-head-dark { display: block !important; }
      .profile-eyes-light { display: none; }
      .profile-eyes-dark { display: block !important; }
      .profile-pupils-light { display: none; }
      .profile-pupils-dark { display: block !important; }
      .profile-mouth-light { display: none; }
      .profile-mouth-dark { display: block !important; }
      .profile-body-light { display: none; }
      .profile-body-dark { display: block !important; }
    }
  </style>
</svg>